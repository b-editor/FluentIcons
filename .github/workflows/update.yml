on:
  schedule:
    - cron: '42 0 * * *'
  workflow_dispatch:

name: Update

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Update
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.TOKEN }}
      - name: Update
        run: ./Invoke-Update.ps1
      - name: Push
        run: git push --recurse-submodules=no --follow-tags origin HEAD:${{ github.ref_name }}
